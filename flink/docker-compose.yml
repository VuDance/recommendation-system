version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: flink-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - flink-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: flink-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://18.140.225.1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "29092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - flink-net

  redis:
    image: redis:7-alpine
    container_name: flink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - flink-net

  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flink-jobmanager
    restart: unless-stopped
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager"
      - "JVM_ARGS=-Xmx1536m -Xms1024m"
    # volumes:
    #   # - flink-data:/opt/flink/usrlib
    #   - ./logs/jobmanager:/opt/flink/log
    volumes:
      - flink-logs-jm:/opt/flink/log
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flink-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v1/overview"]
      interval: 30s
      timeout: 10s
      retries: 3

  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flink-taskmanager
    restart: unless-stopped
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager\ntaskmanager.numberOfTaskSlots: 4"
      - "JVM_ARGS=-Xmx2048m -Xms1024m"
    # volumes:
    #   - ./logs/taskmanager:/opt/flink/log
    volumes:
      - flink-logs-tm:/opt/flink/log
    networks:
      - flink-net
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "taskmanager"]
      interval: 30s
      timeout: 10s
      retries: 3

  job-submitter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flink-job-submitter
    depends_on:
      jobmanager:
        condition: service_healthy
    command: bash -c "echo 'Submitting job...' && /opt/flink/bin/flink run -m jobmanager:8081 /opt/flink/usrlib/flink-job.jar"
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager"
    networks:
      - flink-net
    restart: "no"

volumes:
  flink-logs-jm:
  flink-logs-tm:
  flink-data:
    driver: local
  redis-data:
    driver: local

networks:
  flink-net:
    driver: bridge
