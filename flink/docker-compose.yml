version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: flink-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - flink-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: flink-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_EXTERNAL_HOST}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - flink-net

  redis:
    image: redis:7-alpine
    container_name: flink-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - flink-net

  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flink-jobmanager
    restart: unless-stopped
    ports:
      - "${FLINK_JOBMANAGER_PORT}:8081"
    command: jobmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager"
      - "JVM_ARGS=-Xmx${FLINK_JOBMANAGER_JVM_MEMORY_MAX} -Xms${FLINK_JOBMANAGER_JVM_MEMORY_MIN}"
    # volumes:
    #   # - flink-data:/opt/flink/usrlib
    #   - ./logs/jobmanager:/opt/flink/log
    volumes:
      - flink-logs-jm:/opt/flink/log
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flink-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v1/overview"]
      interval: 30s
      timeout: 10s
      retries: 3

  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flink-taskmanager
    restart: unless-stopped
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager\ntaskmanager.numberOfTaskSlots: ${FLINK_TASKMANAGER_TASK_SLOTS}"
      - "JVM_ARGS=-Xmx${FLINK_TASKMANAGER_JVM_MEMORY_MAX} -Xms${FLINK_TASKMANAGER_JVM_MEMORY_MIN}"
    # volumes:
    #   - ./logs/taskmanager:/opt/flink/log
    volumes:
      - flink-logs-tm:/opt/flink/log
    networks:
      - flink-net
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "taskmanager"]
      interval: 30s
      timeout: 10s
      retries: 3

  job-submitter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flink-job-submitter
    depends_on:
      jobmanager:
        condition: service_healthy
    command: bash /opt/flink/scripts/submit-job.sh
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: jobmanager"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_USER_VIEW_EVENTS: ${KAFKA_TOPIC_USER_VIEW_EVENTS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MILVUS_HOST: ${MILVUS_HOST}
      MILVUS_PORT: ${MILVUS_PORT}
    networks:
      - flink-net
    restart: on-failure

volumes:
  flink-logs-jm:
  flink-logs-tm:
  flink-data:
    driver: local
  redis-data:
    driver: local

networks:
  flink-net:
    driver: bridge
